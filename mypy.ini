[mypy]
python_version = 3.10
strict = True
ignore_missing_imports = True

# pydantic v2 BaseModel subclassing emits [misc] when pydantic stubs are absent
[mypy-notion_mpm.auth.models]
disallow_subclassing_any = False

# click decorators are untyped — suppress for CLI and MCP adapter
[mypy-notion_mpm.cli.*]
disallow_untyped_decorators = False

# MCP server decorators (list_tools / call_tool) may be untyped depending on
# which version of mcp is installed and whether its stubs are available
[mypy-notion_mpm.server.*]
disallow_untyped_decorators = False
disable_error_code = untyped-decorator,no-untyped-call
